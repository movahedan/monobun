name: repo

networks:
  dev-network:
    driver: bridge

volumes:
  node_modules:
    driver: local
  turbo_cache:
    driver: local
  bun_cache:
    driver: local
  vscode_cache:
    driver: local

services:
  # Apps runtime environment - shared container for all applications
  apps:
    build:
      context: ./
      dockerfile: Dockerfile.dev
      # Enable BuildKit for advanced caching
      x-bake:
        contexts:
          buildkit: docker-container://buildkit
      # Enable BuildKit cache from environment
      cache_from:
        - type=gha
      # Increase memory limits to help with node_modules I/O
      shm_size: '1gb'
    env_file:
      - path: ./.env
        required: true
    volumes:
      # Bind mounts for host development; named volumes for heavy paths
      - ${PROJECT_ROOT:-./}/apps:/app/apps:cached
      - ${PROJECT_ROOT:-./}/packages:/app/packages:cached
      - ${PROJECT_ROOT:-./}/tools:/app/tools:cached
      - ${PROJECT_ROOT:-./}/package.json:/app/package.json:cached
      - ${PROJECT_ROOT:-./}/bun.lock:/app/bun.lock:cached
      - ${PROJECT_ROOT:-./}/turbo.json:/app/turbo.json:cached
      - ${PROJECT_ROOT:-./}/intershell.config.ts:/app/intershell.config.ts:cached
      # Override volumes
      - node_modules:/app/node_modules:delegated
      - turbo_cache:/app/.turbo:delegated
      - bun_cache:/root/.bun:delegated
      - vscode_cache:/app/.vscode:delegated
    command: sleep infinity
    # Use init for better signal handling
    init: true
    profiles: ["apps"]
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "ps", "aux"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Lightweight app containers that inherit from apps runtime
  vite-spa:
    extends:
      service: apps
    expose:
      - "3001"
    ports:
      - "3001:3001"
    env_file:
      - path: ./.env
        required: true
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
    command: bun run turbo run dev --filter=vite-spa -- --host 0.0.0.0 --port 3001
    profiles: ["vite-spa", "all"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://vite-spa:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nextjs:
    extends:
      service: apps
    expose:
      - "3002"
    ports:
      - "3002:3002"
    env_file:
      - path: ./.env
        required: true
    environment:
      PORT: "3002"
      HOST: "0.0.0.0"
    command: bun run turbo run dev --filter=nextjs -- --hostname 0.0.0.0 --port 3002
    profiles: ["nextjs", "all"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://nextjs:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  express:
    extends:
      service: apps
    expose:
      - "3003"
    ports:
      - "3003:3003"
    env_file:
      - path: ./.env
        required: true
    environment:
      PORT: "3003"
      HOST: "0.0.0.0"
    command: bun run turbo run dev --filter=express
    profiles: ["express", "all"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://express:3003/status | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  ui:
    extends:
      service: apps
    expose:
      - "3004"
    ports:
      - "3004:3004"
    env_file:
      - path: ./.env
        required: true
    environment:
      PORT: "3004"
      HOST: "0.0.0.0"
    command: bun run turbo run dev --filter=@repo/ui
    profiles: ["ui", "all"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ui:3004"]

  astro-ssg:
    extends:
      service: apps
    expose:
      - "3005"
    ports:
      - "3005:3005"
    env_file:
      - path: ./.env
        required: true
    environment:
      PORT: "3005"
      HOST: "0.0.0.0"
    command: bun run turbo run dev --filter=astro-ssg -- --host 0.0.0.0 --port 3005
    profiles: ["astro-ssg", "all"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://astro-ssg:3005"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
