name: monobun-dev

networks:
  dev-network:
    driver: bridge

volumes:
  node_modules:
    driver: local
  turbo_cache:
    driver: local
  bun_cache:
    driver: local
  vscode_cache:
    driver: local
  postgres_data:
    driver: local

services:
  # Apps runtime environment - shared container for all applications
  apps:
    build:
      context: ./
      dockerfile: Dockerfile.dev
      x-bake:
        contexts:
          buildkit: docker-container://buildkit
      cache_from:
        - type=gha
      shm_size: '1gb'
    volumes:
      - ${PROJECT_ROOT:-./}/apps:/app/apps:cached
      - ${PROJECT_ROOT:-./}/packages:/app/packages:cached
      - ${PROJECT_ROOT:-./}/tools:/app/tools:cached
      - ${PROJECT_ROOT:-./}/package.json:/app/package.json:cached
      - ${PROJECT_ROOT:-./}/bun.lock:/app/bun.lock:cached
      - ${PROJECT_ROOT:-./}/turbo.json:/app/turbo.json:cached
      - ${PROJECT_ROOT:-./}/intershell.config.ts:/app/intershell.config.ts:cached
      - node_modules:/app/node_modules:delegated
      - turbo_cache:/app/.turbo:delegated
      - bun_cache:/root/.bun:delegated
      - vscode_cache:/app/.vscode:delegated
    command: sleep infinity
    init: true
    profiles: ["apps"]
    environment:
      # Bind mounts from macOS often miss inotify; polling makes Vite/Next/Storybook HMR work in containers.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "ps", "aux"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    profiles: ["nestjs", "auth", "all"]
    networks:
      - dev-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monobun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monobun}
      POSTGRES_DB: ${POSTGRES_DB:-monobun}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monobun} -d ${POSTGRES_DB:-monobun}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nestjs:
    x-monobun-package: "@apps/nestjs"
    extends:
      service: apps
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "${NESTJS_PORT:-3006}"
    ports:
      - "${NESTJS_PORT:-3006}:${NESTJS_PORT:-3006}"
    environment:
      HOST: "0.0.0.0"
      PORT: "${NESTJS_PORT:-3006}"
      NESTJS_PORT: "${NESTJS_PORT:-3006}"
      NODE_ENV: development
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3001,http://localhost:3002}
      DATABASE_URL: ${DATABASE_URL:-postgresql://monobun:monobun@postgres:5432/monobun}
    command: bun run turbo run dev --filter=@apps/nestjs
    profiles: ["nestjs", "all"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://nestjs:${NESTJS_PORT:-3006}/status | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  express:
    x-monobun-package: "@apps/express"
    extends:
      service: apps
    expose:
      - "${EXPRESS_PORT:-3003}"
    ports:
      - "${EXPRESS_PORT:-3003}:${EXPRESS_PORT:-3003}"
    environment:
      HOST: "0.0.0.0"
      PORT: "${EXPRESS_PORT:-3003}"
      EXPRESS_PORT: "${EXPRESS_PORT:-3003}"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3001,http://localhost:3002}
    command: bun run turbo run dev --filter=@apps/express
    profiles: ["express", "all"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://express:${EXPRESS_PORT:-3003}/status | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  vite-spa:
    x-monobun-package: "@apps/vite-spa"
    extends:
      service: apps
    depends_on:
      express:
        condition: service_healthy
    expose:
      - "${VITE_SPA_PORT:-3001}"
    ports:
      - "${VITE_SPA_PORT:-3001}:${VITE_SPA_PORT:-3001}"
    environment:
      HOST: "0.0.0.0"
      PORT: "${VITE_SPA_PORT:-3001}"
      VITE_SPA_PORT: "${VITE_SPA_PORT:-3001}"
    command: >
      sh -c "exec bun run turbo run dev --filter=@apps/vite-spa --
      --host 0.0.0.0 --port $$PORT"
    profiles: ["vite-spa", "all"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://vite-spa:${VITE_SPA_PORT:-3001}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nextjs:
    x-monobun-package: "@apps/nextjs"
    extends:
      service: apps
    depends_on:
      express:
        condition: service_healthy
    expose:
      - "${NEXTJS_PORT:-3002}"
    ports:
      - "${NEXTJS_PORT:-3002}:${NEXTJS_PORT:-3002}"
    environment:
      HOST: "0.0.0.0"
      PORT: "${NEXTJS_PORT:-3002}"
      NEXTJS_PORT: "${NEXTJS_PORT:-3002}"
    command: >
      sh -c "exec bun run turbo run dev --filter=@apps/nextjs --
      --hostname 0.0.0.0 --port $$PORT"
    profiles: ["nextjs", "all"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://nextjs:${NEXTJS_PORT:-3002}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  ui:
    x-monobun-package: "@packages/ui"
    extends:
      service: apps
    expose:
      - "${UI_PORT:-3004}"
    ports:
      - "${UI_PORT:-3004}:${UI_PORT:-3004}"
    environment:
      HOST: "0.0.0.0"
      PORT: "${UI_PORT:-3004}"
      UI_PORT: "${UI_PORT:-3004}"
    command: bun run turbo run dev --filter=@packages/ui
    profiles: ["ui", "all"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ui:${UI_PORT:-3004}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  auth:
    extends:
      service: apps
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "${AUTH_PORT:-3007}"
    ports:
      - "${AUTH_PORT:-3007}:${AUTH_PORT:-3007}"
    environment:
      HOST: "0.0.0.0"
      PORT: "${AUTH_PORT:-3007}"
      AUTH_PORT: "${AUTH_PORT:-3007}"
      NODE_ENV: development
      AUTH_ISSUER: ${AUTH_ISSUER:-http://localhost:3007}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE:-monobun-api}
      AUTH_AUDIENCE_EVAL: ${AUTH_AUDIENCE_EVAL:-monobun-eval}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:-postgresql://monobun:monobun@postgres:5432/monobun_auth}
      AUTH_ACCESS_TTL_SECONDS: ${AUTH_ACCESS_TTL_SECONDS:-900}
      AUTH_COOKIE_SECURE: "false"
      AUTH_SEED_ADMIN_EMAIL: ${AUTH_SEED_ADMIN_EMAIL:-admin@example.com}
      AUTH_SEED_ADMIN_PASSWORD: ${AUTH_SEED_ADMIN_PASSWORD:-changeme}
    command: >
      sh -c "cd apps/auth && bun run db:generate && bun run db:migrate && bun run db:seed &&
      cd ../.. && bun run turbo run dev --filter=@apps/auth"
    profiles: ["auth", "all"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://auth:${AUTH_PORT:-3007}/status | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  astro-ssg:
    x-monobun-package: "@apps/astro-ssg"
    extends:
      service: apps
    expose:
      - "${ASTRO_SSG_PORT:-3005}"
    ports:
      - "${ASTRO_SSG_PORT:-3005}:${ASTRO_SSG_PORT:-3005}"
    environment:
      HOST: "0.0.0.0"
      PORT: "${ASTRO_SSG_PORT:-3005}"
      ASTRO_SSG_PORT: "${ASTRO_SSG_PORT:-3005}"
    command: >
      sh -c "exec bun run turbo run dev --filter=@apps/astro-ssg --
      --host 0.0.0.0 --port $$PORT"
    profiles: ["astro-ssg", "all"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://astro-ssg:${ASTRO_SSG_PORT:-3005}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
