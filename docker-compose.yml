name: repo-prod

networks:
  prod-network:
    driver: bridge

services:
  vite-spa:
    build:
      context: .
      dockerfile: apps/vite-spa/Dockerfile
    ports:
      - "5001:5001"
    networks:
      - prod-network
    environment:
      - PORT=5001
      - HOST=0.0.0.0
      - NODE_ENV=production
      - VITE_API_URL=http://express:5003
    depends_on:
      - express
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nextjs:
    build:
      context: .
      dockerfile: apps/nextjs/Dockerfile
    ports:
      - "5002:5002"
    networks:
      - prod-network
    environment:
      - PORT=5002
      - HOST=0.0.0.0
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://express:5003
    depends_on:
      - express
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  express:
    build:
      context: .
      dockerfile: apps/express/Dockerfile
    ports:
      - "5003:5003"
    networks:
      - prod-network
    environment:
      - PORT=5003
      - HOST=0.0.0.0
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    ports:
      - "5006:5006"
    networks:
      - prod-network
    environment:
      - PORT=5006
      - HOST=0.0.0.0
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  astro-ssg:
    build:
      context: .
      dockerfile: apps/astro-ssg/Dockerfile
    ports:
      - "5007:5007"
    networks:
      - prod-network
    environment:
      - PORT=5007
      - HOST=0.0.0.0
      - NODE_ENV=production
      - ASTRO_SITE_PATH=localhost:5007
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
